    - name: Check if 389-DS instance already exists
      ansible.builtin.stat:
        path: "/etc/dirsrv/slapd-{{ ldap_instance }}"
      register: ds_instance

    - name: Create dscreate configuration
      ansible.builtin.copy:
        dest: /tmp/dscreate.inf
        content: |
          [general]
          config_version = 2

          [slapd]
          instance_name = {{ ldap_instance }}
          root_password = {{ ldap_root_password }}
          port = 389
          secure_port = 636
          self_sign_cert = True

          [backend-userroot]
          create_suffix_entry = True
          suffix = {{ ldap_suffix }}

      when: not ds_instance.stat.exists

    - name: Create 389 Directory Server instance
      ansible.builtin.command:
        cmd: dscreate from-file /tmp/dscreate.inf
      when: not ds_instance.stat.exists

    - name: Enable and start LDAP service
      ansible.builtin.systemd:
        name: "dirsrv@{{ ldap_instance }}"
        enabled: true
        state: started

    - name: Wait for LDAP startup
      ansible.builtin.pause:
        seconds: 15

    - name: Create LDAP root suffix LDIF
      ansible.builtin.copy:
        dest: /tmp/root.ldif
        content: |
          dn: {{ ldap_suffix }}
          objectClass: top
          objectClass: dcObject
          objectClass: organization
          o: HPC India
          dc: hpcindia

    - name: Create LDAP root suffix
      ansible.builtin.shell: |
        ldapadd \
          -x \
          -D "{{ ldap_root_dn }}" \
          -w "{{ ldap_root_password }}" \
          -H ldap://localhost \
          -f /tmp/root.ldif
      ignore_errors: true

    - name: Create LDAP OU structure
      ansible.builtin.copy:
        dest: /tmp/base.ldif
        content: |
          dn: ou=People,{{ ldap_suffix }}
          objectClass: top
          objectClass: organizationalUnit
          ou: People

          dn: ou=Groups,{{ ldap_suffix }}
          objectClass: top
          objectClass: organizationalUnit
          ou: Groups

    - name: Import LDAP OU structure
      ansible.builtin.shell: |
        ldapadd \
          -x \
          -D "{{ ldap_root_dn }}" \
          -w "{{ ldap_root_password }}" \
          -H ldap://localhost \
          -f /tmp/base.ldif
      ignore_errors: true

    - name: Verify LDAP suffix exists
      ansible.builtin.shell: |
        ldapsearch \
          -x \
          -D "{{ ldap_root_dn }}" \
          -w "{{ ldap_root_password }}" \
          -b "{{ ldap_suffix }}" \
          -H ldap://localhost dn
      register: ldap_verify
      changed_when: false

    - name: Show LDAP contents
      ansible.builtin.debug:
        var: ldap_verify.stdout_lines
