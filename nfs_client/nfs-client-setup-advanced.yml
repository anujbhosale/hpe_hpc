---
- name: Install and configure NFS client (Advanced)
  hosts: all
  become: yes
  vars_files:
    - nfs_client_vars.yml
  vars:
    nfs_server_host: "10.25.67.100"
    nfs_export_path: "/hpcdata"
    nfs_mount_point: "/hpcdata"
    nfs_mount_options: "rw,sync,hard,intr"
    configure_firewall: false
    configured_nfs_mounts: "{{ nfs_mounts | default([{'export_path': nfs_export_path, 'mount_point': nfs_mount_point}]) }}"

  pre_tasks:
    - name: Validate NFS server is reachable
      wait_for:
        host: "{{ nfs_server_host }}"
        port: 111
        timeout: 10
      register: nfs_server_check
      failed_when: false
      changed_when: false

    - name: Warn if NFS server not reachable
      debug:
        msg: "WARNING: NFS server {{ nfs_server_host }} not reachable on port 111"
      when: nfs_server_check.failed

  tasks:
    - name: Install NFS client packages (Debian/Ubuntu)
      block:
        - name: Update package cache
          apt:
            update_cache: yes
            cache_valid_time: 3600

        - name: Install NFS utilities
          apt:
            name:
              - nfs-common
              - nfs-kernel-server
            state: present
      when: ansible_os_family == "Debian"
      tags: install

    - name: Install NFS client packages (RedHat/CentOS)
      yum:
        name:
          - nfs-utils
        state: present
      when: ansible_os_family == "RedHat"
      tags: install

    - name: Install NFS client packages (Fedora)
      dnf:
        name:
          - nfs-utils
        state: present
      when: ansible_os_family == "Fedora"
      tags: install

    - name: Enable and start rpcbind service
      systemd:
        name: rpcbind
        state: started
        enabled: yes
        daemon_reload: yes
      tags: services

    - name: Create mount point directories
      file:
        path: "{{ item.mount_point }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
      loop: "{{ configured_nfs_mounts }}"
      tags: mount

    - name: Mount NFS shares
      ansible.posix.mount:
        path: "{{ item.mount_point }}"
        src: "{{ nfs_server_host }}:{{ item.export_path }}"
        fstype: nfs
        opts: "{{ nfs_mount_options }}"
        state: mounted
      register: mount_result
      loop: "{{ configured_nfs_mounts }}"
      tags: mount
      ignore_errors: yes

    - name: Handle mount failures
      block:
        - name: Display mount error
          debug:
            msg: "Mount failed. Output: {{ mount_result.stderr }}"
          when: mount_result is failed

        - name: Check NFS kernel module
          shell: lsmod | grep nfs
          register: nfs_module
          changed_when: false

        - name: Load NFS kernel module if missing
          modprobe:
            name: nfs
            state: present
          when: nfs_module.stdout == ""

        - name: Retry NFS mount
          ansible.posix.mount:
            path: "{{ item.mount_point }}"
            src: "{{ nfs_server_host }}:{{ item.export_path }}"
            fstype: nfs
            opts: "{{ nfs_mount_options }}"
            state: mounted
          loop: "{{ configured_nfs_mounts }}"
      when: mount_result is failed
      tags: mount

    - name: Configure firewall (firewalld)
      block:
        - name: Enable NFS in firewalld
          firewalld:
            service: "{{ item }}"
            state: enabled
            permanent: yes
          with_items:
            - nfs
            - rpc-bind
          notify: reload firewalld
      when: configure_firewall and ansible_os_family in ["RedHat", "Fedora"]
      tags: firewall

    - name: Verify NFS mounts
      command: "df -h {{ item.mount_point }}"
      register: mount_verify
      changed_when: false
      loop: "{{ configured_nfs_mounts }}"
      tags: verify

    - name: Display mount status
      debug:
        msg: |
          NFS Mount Verification:
            {{ mount_verify.results | map(attribute='stdout') | list }}
      tags: verify

    - name: Test NFS write permissions
      block:
        - name: Create test file on NFS share
          file:
            path: "{{ item.mount_point }}/ansible_test_{{ ansible_date_time.iso8601_basic }}"
            state: touch
          register: test_write
          loop: "{{ configured_nfs_mounts }}"

        - name: Verify test file
          stat:
            path: "{{ test_write.path }}"
          register: test_file_stat

        - name: Display write test result
          debug:
            msg: "Successfully wrote test file to NFS share"
          when: test_file_stat.stat.exists
      tags: verify
      ignore_errors: yes

  post_tasks:
    - name: Display final status
      debug:
        msg: |
          NFS Client Installation Complete!
          Server: {{ nfs_server_host }}
          Mounts: {{ configured_nfs_mounts }}
          Mount Options: {{ nfs_mount_options }}

  handlers:
    - name: reload firewalld
      systemd:
        name: firewalld
        state: restarted
