---
- name: Install and configure NFS client
  hosts: all
  become: yes
  vars_files:
    - nfs_client_vars.yml
  vars:
    nfs_server_host: "10.25.67.100"   # NFS server IP
    nfs_export_path: "/hpcdata"        # Fallback single NFS export path on server
    nfs_mount_point: "/hpcdata"        # Fallback single local mount point
    nfs_mount_options: "rw,sync,hard,intr"
    configured_nfs_mounts: "{{ nfs_mounts | default([{'export_path': nfs_export_path, 'mount_point': nfs_mount_point}]) }}"

  tasks:
    - name: Update package cache (Debian/Ubuntu)
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install NFS client packages (Debian/Ubuntu)
      apt:
        name:
          - nfs-common
          - nfs-kernel-server
        state: present
      when: ansible_os_family == "Debian"

    - name: Install NFS client packages (RedHat/CentOS)
      yum:
        name:
          - nfs-utils
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install NFS client packages (Fedora)
      dnf:
        name:
          - nfs-utils
        state: present
      when: ansible_os_family == "Fedora"

    - name: Start and enable NFS services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      with_items:
        - rpcbind
      when: ansible_os_family != "Fedora"

    - name: Start and enable NFS services (Fedora)
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      with_items:
        - rpcbind
      when: ansible_os_family == "Fedora"

    - name: Create mount point directories
      file:
        path: "{{ item.mount_point }}"
        state: directory
        mode: '0755'
      loop: "{{ configured_nfs_mounts }}"

    - name: Mount NFS shares
      mount:
        path: "{{ item.mount_point }}"
        src: "{{ nfs_server_host }}:{{ item.export_path }}"
        fstype: nfs
        opts: "{{ nfs_mount_options }}"
        state: mounted
      loop: "{{ configured_nfs_mounts }}"

    - name: Verify NFS mounts
      command: "df -h {{ item.mount_point }}"
      register: mount_result
      changed_when: false
      loop: "{{ configured_nfs_mounts }}"

    - name: Display mount information
      debug:
        msg: "{{ mount_result.results | map(attribute='stdout_lines') | list }}"
